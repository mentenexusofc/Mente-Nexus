version: '3.8'

services:
  backend:
    build:
      context: ./site/backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - N8N_URL=${N8N_URL}
      - N8N_API_KEY=${N8N_API_KEY}
    restart: unless-stopped
    networks:
      - nexus-net

networks:
  nexus-net:
    driver: bridge
